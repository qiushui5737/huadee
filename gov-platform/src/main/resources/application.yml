server:
  port: 8080

spring:
  application:
    name: gov-platform
  datasource:
    url: "${DB_URL:jdbc:mysql://localhost:3306/gov_platform?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai}"
    username: "${DB_USERNAME:root}"
    password: "${DB_PASSWORD:050420}"
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: "${REDIS_HOST:localhost}"
      port: ${REDIS_PORT:6379}
      database: 0
  elasticsearch:
    uris: "${ELASTICSEARCH_URIS:http://127.0.0.1:9200}"
    connection-timeout: 3s
    socket-timeout: 10s

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

ai:
  # Set true to call a real OpenAI-compatible AI API; false uses local RAG fallback.
  enabled: ${AI_ENABLED:false}
  # Example: https://api.openai.com/v1 or your provider/proxy /v1 base URL.
  base-url: "${AI_BASE_URL:}"
  # Do not commit a real API key. Set AI_API_KEY in your local environment.
  api-key: "${AI_API_KEY:}"
  chat-model: "${AI_CHAT_MODEL:gpt-4o-mini}"
  # Disable deep reasoning by default to reduce time to first token for routine government Q&A.
  thinking-enabled: ${AI_THINKING_ENABLED:false}
  timeout-seconds: ${AI_TIMEOUT_SECONDS:120}
  search:
    elasticsearch-enabled: ${AI_ELASTICSEARCH_ENABLED:true}
    index-name: ${AI_SEARCH_INDEX:gov_content_v1}
  embedding:
    # Configure a dedicated OpenAI-compatible embedding endpoint to enable neural semantic search.
    enabled: ${AI_EMBEDDING_ENABLED:false}
    base-url: "${AI_EMBEDDING_BASE_URL:}"
    api-key: "${AI_EMBEDDING_API_KEY:}"
    model: "${AI_EMBEDDING_MODEL:text-embedding-3-small}"
    dimensions: ${AI_EMBEDDING_DIMENSIONS:384}
    min-score: ${AI_EMBEDDING_MIN_SCORE:0.15}
