# =====================================================
# 政府网站集约化平台 Nginx配置 (单体模式)
# C端群众客户端: portal.gov.cn -> 互联网DMZ区
# B端政府管理端: admin.gov.cn -> 政务内网隔离区(需VPN)
# 后端统一端口: localhost:8080
# =====================================================

# ===== C端群众客户端 (互联网入口) =====
server {
    listen 80;
    server_name portal.gov.cn;

    location / {
        root /usr/share/nginx/html/portal;
        try_files $uri $uri/ /index.html;
    }

    # 所有API统一代理到单体后端(8080)
    location /api/ {
        proxy_pass http://localhost:8080;
    }

    # SSE流式问答 - 禁用缓冲
    location /api/v1/ai/chat/stream {
        proxy_pass http://localhost:8080;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }
}

# ===== B端政府管理端 (政务内网隔离入口) =====
server {
    listen 80;
    server_name admin.gov.cn;

    # IP白名单限制(仅政务内网)
    allow 10.0.0.0/8;
    allow 172.16.0.0/12;
    deny all;

    location / {
        root /usr/share/nginx/html/admin;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://localhost:8080;
    }
}
